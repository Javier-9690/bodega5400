services:
  - type: web
    name: bodega-5400
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bodega-5400-db
          property: connectionString

databases:
  - name: bodega-5400-db
    databaseName: bodega_5400
    user: bodega_5400_user

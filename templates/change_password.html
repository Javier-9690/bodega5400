{% extends "base.html" %}
{% block content %}
<section class="hero card-soft">
    <div>
        <p class="eyebrow">Seguridad</p>
        <h1>Cambiar clave de acceso</h1>
        <p class="subtitle">Actualiza la clave del usuario conectado. La nueva clave reemplaza la clave inicial.</p>
    </div>
    <div class="hero-actions">
        <a class="btn outline-green" href="{{ url_for('index') }}">← Volver al dashboard</a>
    </div>
</section>

<section class="auth-shell compact-auth">
    <article class="panel auth-card-white">
        <div class="panel-header single">
            <p class="eyebrow">Usuario actual</p>
            <h2>{{ current_user.username }}</h2>
            <p class="subtitle small-subtitle">Usa una clave de al menos 8 caracteres.</p>
        </div>
        <form method="post" class="stack-form">
            <label>Clave actual
                <input name="current_password" type="password" required autofocus>
            </label>
            <label>Nueva clave
                <input name="new_password" type="password" minlength="8" required>
            </label>
            <label>Confirmar nueva clave
                <input name="confirm_password" type="password" minlength="8" required>
            </label>
            <button class="btn red full" type="submit">Guardar nueva clave</button>
        </form>
    </article>
</section>
{% endblock %}
